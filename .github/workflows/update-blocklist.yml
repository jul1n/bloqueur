name: Mise à jour de la blocklist

on:
  schedule:
    - cron: "0 4 * * *"   # tous les jours à 4h UTC
  workflow_dispatch:        # bouton "Run workflow" manuel sur GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Restaurer le cache HTTP + le snapshot de diff
        uses: actions/cache@v4
        with:
          path: |
            .cache
            dist/Liste.txt.prev
          key: bloqueur-${{ github.run_id }}
          restore-keys: |
            bloqueur-

      - name: Générer la blocklist
        id: generate
        run: |
          python bloqueur.py \
            --output dist/Liste.txt \
            --format hosts \
            --log-file run.log \
            --no-archive \
            --max-dead-pct 30
        continue-on-error: true   # on committe quand même le résultat, l'échec du job est décidé plus bas

      - name: Committer si changement
        run: |
          git config user.name "bloqueur-bot"
          git config user.email "actions@users.noreply.github.com"
          git add dist/Liste.txt dist/Liste.txt.prev
          if ! git diff --cached --quiet; then
            git commit -m "Mise à jour automatique de la blocklist ($(date -u +%Y-%m-%dT%H:%M:%SZ))"
            git push
          else
            echo "Rien à committer (liste inchangée)."
          fi

      - name: Publier le log en cas d'échec ou de dégradation
        if: steps.generate.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: bloqueur-run-log
          path: run.log

      - name: Faire échouer le job si trop de sources sont mortes
        if: steps.generate.outcome == 'failure'
        run: |
          echo "::error::bloqueur.py a signalé une dégradation (voir l'artefact run.log)."
          exit 1
